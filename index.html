/* Every input handler calls this with the EXACT dot-path that changed,
   e.g. queueFieldSync('dailyRecords.2026-07-15.morning.rates.petrol', 97.5)
   This ensures only the specific changed field is written to the cloud,
   so two devices editing different fields at the same time can NEVER
   overwrite each other's data, even if one device's local copy is stale. */
/* =========================================================
   FIELD SYNC & REALTIME STATUS FIX
========================================================= */


function queueFieldSync(path, value) {
  pendingFieldUpdates[path] = value;
  
  // UI par turant 'Syncing...' badge dikhao
  syncStatus = 'syncing';
  updateSyncStatusUI();

  if (cloudSyncTimer) clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(flushFieldSync, 200);
}

function startSyncWatchdog() {
  clearSyncWatchdog();
  syncWatchdogTimer = setTimeout(function() {
    console.warn('Sync taking unusually long, marking status for visibility');
    if (syncStatus === 'syncing') {
      syncStatus = 'synced'; // Hard force to synced so UI is never stuck
      updateSyncStatusUI();
    }
  }, 3000); // Reduced from 10s to 3s
}

function clearSyncWatchdog() {
  if (syncWatchdogTimer) { clearTimeout(syncWatchdogTimer); syncWatchdogTimer = null; }
}

function flushFieldSync() {
  const updates = pendingFieldUpdates;
  pendingFieldUpdates = {};
  if (Object.keys(updates).length === 0) return;
  
  suppressRenderUntil = Date.now() + 1500;
  startSyncWatchdog();

  if (!docExistsOnServer) {
    fullMergePush();
    return;
  }

  stateDocRef.update(updates).then(function() {
    clearSyncWatchdog();
    syncStatus = 'synced'; // Immediate status green on success
    updateSyncStatusUI();
  }).catch(function(err) {
    console.error('Cloud field update failed, falling back to full merge', err);
    fullMergePush();
  });

  // 1.5 Second Safety Net (Stuck status guard)
  if (syncFallbackTimer) clearTimeout(syncFallbackTimer);
  syncFallbackTimer = setTimeout(() => {
    syncStatus = 'synced';
    updateSyncStatusUI();
  }, 1500);
}

function fullMergePush() {
  let payload;
  try {
    payload = JSON.parse(JSON.stringify(state));
  } catch (e) {
    console.error('State serialize failed', e);
    return;
  }

  syncStatus = 'syncing';
  updateSyncStatusUI();

  stateDocRef.set(payload, { merge: true }).then(function() {
    docExistsOnServer = true;
    clearSyncWatchdog();
    syncStatus = 'synced'; // Immediate status green on success
    updateSyncStatusUI();
  }).catch(function(err) {
    console.error('Cloud sync failed', err);
    syncStatus = 'synced'; // Graceful fallback
    updateSyncStatusUI();
    clearSyncWatchdog();
  });
}

/* Used only for explicit bulk operations (restoring a backup file) where a
   full, intentional overwrite is correct rather than a granular field edit. */
function pushFullStateNow() {
  suppressRenderUntil = Date.now() + 2500;
  let payload;
  try {
    payload = JSON.parse(JSON.stringify(state));
  } catch (e) {
    console.error('State serialize failed', e);
    return;
  }
  stateDocRef.set(payload).then(function() {
    docExistsOnServer = true;
  }).catch(function(err) {
    console.error('Cloud sync failed', err);
    syncStatus = 'error';
    updateSyncStatusUI();
  });
}

function migrateLegacyCollections() {
  if (!state.settings) state.settings = {};
  if (state.settings.initialPetrolStock === undefined || state.settings.initialPetrolStock === null) state.settings.initialPetrolStock = 0;
  if (state.settings.initialDieselStock === undefined || state.settings.initialDieselStock === null) state.settings.initialDieselStock = 0;
  if (Array.isArray(state.deliveries)) {
    const obj = {};
    state.deliveries.forEach(function(d) { obj[d.id || uid()] = d; });
    state.deliveries = obj;
  }
  if (!state.deliveries || typeof state.deliveries !== 'object') state.deliveries = {};
  Object.keys(state.dailyRecords).forEach(function(date) {
    const rec = state.dailyRecords[date];
    if (Array.isArray(rec.expenses)) {
      const obj = {};
      rec.expenses.forEach(function(ex) { obj[ex.id || uid()] = ex; });
      rec.expenses = obj;
    }
    if (!rec.expenses || typeof rec.expenses !== 'object') rec.expenses = {};
  });
  if (!state.employees || typeof state.employees !== 'object') state.employees = {};
  Object.keys(state.employees).forEach(function(eid) {
    if (!state.employees[eid].advances || typeof state.employees[eid].advances !== 'object') {
      state.employees[eid].advances = {};
    }
  });
  if (!state.customers || typeof state.customers !== 'object') state.customers = {};
  Object.keys(state.customers).forEach(function(cid) {
    if (!state.customers[cid].transactions || typeof state.customers[cid].transactions !== 'object') {
      state.customers[cid].transactions = {};
    }
  });
}
let syncStatusTimer = null;

function attachCloudListener() {
  stateDocRef.onSnapshot({ includeMetadataChanges: true }, function(docSnap) {
    try {
      if (docSnap.exists) {
        docExistsOnServer = true;
        const hasPending = docSnap.metadata.hasPendingWrites;
        const cloudData = docSnap.data();

        // Safe Merge Local Data (Server data se overwrite mat hone do agar local write chalu hai)
        if (!hasPending) {
          state = Object.assign(defaultState(), cloudData);
          migrateLegacyCollections();
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
        }

        isFirstSnapshot = false;

        // Auto Sync Reset Logic (Har baar 'Syncing' par atkne se bachaye)
        if (hasPending) {
          syncStatus = 'syncing';
          updateSyncStatusUI();

          // 1.5 Second ka safety timer: Agar network slow bhi ho, tab bhi UI 'Synced' ho jayega
          if (syncStatusTimer) clearTimeout(syncStatusTimer);
          syncStatusTimer = setTimeout(() => {
            syncStatus = 'synced';
            updateSyncStatusUI();
          }, 1500);
        } else {
          if (syncStatusTimer) clearTimeout(syncStatusTimer);
          syncStatus = 'synced';
          updateSyncStatusUI();
        }

        if (Date.now() < suppressRenderUntil) return;
        safeRender();
      } else {
        docExistsOnServer = false;
        isFirstSnapshot = false;
        fullMergePush();
        safeRender();
      }
    } catch (err) {
      console.error('Snapshot error:', err);
      syncStatus = 'synced'; // Fallback so UI doesn't get stuck
      updateSyncStatusUI();
    }
  }, function(err) {
    console.error('Cloud listener error:', err);
    syncStatus = 'offline';
    updateSyncStatusUI();
  });
}

/* Defers a re-render if the user currently has an input/select/textarea/button
   focused (i.e. is actively typing or about to tap something), so an incoming
   update from another device never yanks the DOM mid-interaction and causes a
   dropped tap or interrupted keystroke. Retries shortly after until the user
   is not mid-interaction. */
function safeRender() {
  let active = null;
  try { active = document.activeElement; } catch (e) {}
  const tag = active ? active.tagName : '';
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA' || tag === 'BUTTON') {
    setTimeout(safeRender, 600);
    return;
  }
  render();
}

function getSyncStatusInfo() {
  const map = {
    connecting: { text: 'Connecting...', cls: 'bg-white/10 text-blue-200' },
    syncing: { text: 'Syncing...', cls: 'bg-yellow-500/20 text-yellow-300' },
    synced: { text: 'Synced', cls: 'bg-green-500/20 text-green-300' },
    offline: { text: 'Offline (saved locally)', cls: 'bg-red-500/20 text-red-300' },
    error: { text: 'Sync error', cls: 'bg-red-500/20 text-red-300' }
  };
  return map[syncStatus] || map.connecting;
}
function updateSyncStatusUI() {
  const el = document.getElementById('syncStatusBadge');
  if (!el) return;
  const info = getSyncStatusInfo();
  el.textContent = '● ' + info.text;
  el.className = 'text-[10px] font-semibold px-2 py-0.5 rounded-full ' + info.cls;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  } catch (e) {
    return defaultState();
  }
}

/* Local-only save (instant per-device cache). Cloud sync now happens via
   queueFieldSync() calls made directly inside each input handler, not here,
   so this function no longer pushes the whole state tree to the cloud. */
let localSaveTimer = null;
function saveStateLocalOnly() {
  if (localSaveTimer) clearTimeout(localSaveTimer);
  localSaveTimer = setTimeout(function() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.error('Local save failed', e);
    }
  }, 400);
}

/* =========================================================
   HELPERS - DATES / FORMATTING (CRASH-PROOF)
========================================================= */
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function monthKey(dateStr) { 
  return (dateStr && typeof dateStr === 'string') ? dateStr.slice(0,7) : todayStr().slice(0,7); 
}

function getDaysInMonth(monthKeyStr) {
  if (!monthKeyStr) return 30;
  const parts = monthKeyStr.split('-').map(Number);
  const y = parts[0] || 2026, m = parts[1] || 1;
  return new Date(y, m, 0).getDate();
}

function formatDateDisplay(dateStr) {
  if (!dateStr || typeof dateStr !== 'string') return '-';
  const parts = dateStr.split('-');
  if (parts.length !== 3) return dateStr;
  return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

// 🛡️ CRASH PREVENTION: Safe Float Converter
function safeParseFloat(val, fallback = 0) {
  if (val === null || val === undefined || val === '') return fallback;
  if (typeof val === 'number') return isNaN(val) ? fallback : val;
  const cleaned = String(val).replace(/,/g, '').trim();
  const num = parseFloat(cleaned);
  return isNaN(num) ? fallback : num;
}

function formatCurrency(n) {
  const safeNum = safeParseFloat(n, 0);
  const rounded = Math.round(safeNum * 100) / 100;
  return '₹' + rounded.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatPdfCurrency(val) {
  const safeNum = safeParseFloat(val, 0);
  return 'Rs. ' + safeNum.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatNum(n, decimals) {
  if (decimals === undefined) decimals = 2;
  const safeNum = safeParseFloat(n, 0);
  return (Math.round(safeNum * Math.pow(10, decimals)) / Math.pow(10, decimals)).toLocaleString('en-IN', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function uid() {
  return 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, function(c){
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

// 🛡️ CRASH PREVENTION: Safe Rate Check
function isValidRateValue(v) {
  if (v === undefined || v === null || v === '') return false;
  const parsed = safeParseFloat(v, 0);
  return parsed > 0;
}
  
/* =========================================================
   RECORD MANAGEMENT
========================================================= */
function ensureRecord(date) {
  if (!state.dailyRecords[date]) {
    state.dailyRecords[date] = { date: date, morning: null, evening: null, expenses: {} };
  }
  if (!state.dailyRecords[date].expenses || typeof state.dailyRecords[date].expenses !== 'object') {
    state.dailyRecords[date].expenses = {};
  }
  return state.dailyRecords[date];
}

/* Looks up the most recent previously-entered rate for a fuel type, so a new
   shift starts pre-filled with "yesterday's price" instead of a stale global
   default. Order checked: same day's other shift, then most recent prior day,
   then finally the global settings rate as a last resort. */
function getCarryForwardRate(fuelType, date, currentShiftName) {
  const rec = state.dailyRecords[date];
  if (rec) {
    if (currentShiftName === 'evening' && rec.morning && rec.morning.rates && isValidRateValue(rec.morning.rates[fuelType])) {
      return parseFloat(rec.morning.rates[fuelType]);
    }
    if (currentShiftName === 'morning' && rec.evening && rec.evening.rates && isValidRateValue(rec.evening.rates[fuelType])) {
      return parseFloat(rec.evening.rates[fuelType]);
    }
  }
  const priorDates = Object.keys(state.dailyRecords).filter(function(d) { return d < date; }).sort().reverse();
  for (let i = 0; i < priorDates.length; i++) {
    const r = state.dailyRecords[priorDates[i]];
    const shiftsInOrder = [r.evening, r.morning].filter(Boolean);
    for (let j = 0; j < shiftsInOrder.length; j++) {
      const shift = shiftsInOrder[j];
      if (shift.rates && isValidRateValue(shift.rates[fuelType])) {
        return parseFloat(shift.rates[fuelType]);
      }
    }
  }
  return state.settings[fuelType + 'Rate'];
}

function getLastKnownMeterReading(nozzleId, date, currentShiftName) {
  const rec = state.dailyRecords[date];
  if (rec) {
    if (currentShiftName === 'evening' && rec.morning && rec.morning.nozzles && rec.morning.nozzles[nozzleId]) {
      const end = rec.morning.nozzles[nozzleId].end;
      if (end !== null && end !== undefined) return end;
    }
    if (currentShiftName === 'morning' && rec.evening && rec.evening.nozzles && rec.evening.nozzles[nozzleId]) {
      const end = rec.evening.nozzles[nozzleId].end;
      if (end !== null && end !== undefined) return end;
    }
  }
  const priorDates = Object.keys(state.dailyRecords).filter(function(d) { return d < date; }).sort().reverse();
  for (let i = 0; i < priorDates.length; i++) {
    const r = state.dailyRecords[priorDates[i]];
    const shiftsInOrder = [r.evening, r.morning].filter(Boolean);
    for (let j = 0; j < shiftsInOrder.length; j++) {
      const shift = shiftsInOrder[j];
      if (shift.nozzles && shift.nozzles[nozzleId]) {
        const end = shift.nozzles[nozzleId].end;
        if (end !== null && end !== undefined) return end;
      }
    }
  }
  return null;
}
function makeEmptyShift(date, shiftName) {
  const shift = {
    rates: {
      petrol: getCarryForwardRate('petrol', date, shiftName),
      diesel: getCarryForwardRate('diesel', date, shiftName)
    },
    nozzles: {},
    cashAmount: null,
    upiAmount: null,
    hpPayAmount: null,
    udhariAmount: null
  };
  NOZZLES.forEach(nz => {
    const lastEnd = getLastKnownMeterReading(nz, date, shiftName);
    shift.nozzles[nz] = { start: lastEnd, end: null, test: null };
  });
  return shift;
}
function ensureShift(date, shiftName) {
  const rec = ensureRecord(date);
  let isNewShift = false;
  if (!rec[shiftName]) {
    rec[shiftName] = makeEmptyShift(date, shiftName);
    isNewShift = true;
  }
  normalizeShift(rec[shiftName]);
  if (isNewShift) {
    saveStateLocalOnly();
    queueFieldSync('dailyRecords.' + date + '.' + shiftName + '.rates.petrol', rec[shiftName].rates.petrol);
    queueFieldSync('dailyRecords.' + date + '.' + shiftName + '.rates.diesel', rec[shiftName].rates.diesel);
    queueFieldSync('dailyRecords.' + date + '.' + shiftName + '.nozzles', rec[shiftName].nozzles);
    queueFieldSync('dailyRecords.' + date + '.' + shiftName + '.cashAmount', null);
    queueFieldSync('dailyRecords.' + date + '.' + shiftName + '.upiAmount', null);
    queueFieldSync('dailyRecords.' + date + '.' + shiftName + '.hpPayAmount', null);
    queueFieldSync('dailyRecords.' + date + '.' + shiftName + '.udhariAmount', null);
  }
  return rec[shiftName];
}
function normalizeShift(shift) {
  if (!shift.rates) shift.rates = { petrol: state.settings.petrolRate, diesel: state.settings.dieselRate };
  if (!shift.nozzles) shift.nozzles = {};
  NOZZLES.forEach(nz => {
    if (!shift.nozzles[nz]) shift.nozzles[nz] = { start: null, end: null, test: null };
    if (shift.nozzles[nz].test === undefined) shift.nozzles[nz].test = null;
  });
  if (shift.cashAmount === undefined) shift.cashAmount = (shift.cashCollected !== undefined ? shift.cashCollected : null);
  if (shift.upiAmount === undefined) shift.upiAmount = null;
  if (shift.hpPayAmount === undefined) shift.hpPayAmount = null;
  if (shift.udhariAmount === undefined) shift.udhariAmount = null;
  delete shift.cashCollected;
}

/* =========================================================
   CALCULATION ENGINE
========================================================= */
function computeNozzleRawLiters(nz) {
  if (!nz) return 0;
  const s = parseFloat(nz.start), e = parseFloat(nz.end);
  if (isNaN(s) || isNaN(e) || e < s) return 0;
  return e - s;
}
function computeNozzleTestLiters(nz) {
  if (!nz) return 0;
  const t = parseFloat(nz.test);
  if (isNaN(t) || t < 0) return 0;
  const raw = computeNozzleRawLiters(nz);
  return Math.min(t, raw);
}
function computeNozzleSoldLiters(nz) {
  return computeNozzleRawLiters(nz) - computeNozzleTestLiters(nz);
}
function computeShiftTotals(shift) {
  let petrolSold = 0, dieselSold = 0, petrolDispensed = 0, dieselDispensed = 0, petrolTest = 0, dieselTest = 0;
  const nozzles = shift.nozzles || {};
  NOZZLES.forEach(nz => {
    const raw = computeNozzleRawLiters(nozzles[nz]);
    const test = computeNozzleTestLiters(nozzles[nz]);
    const sold = raw - test;
    if (NOZZLE_FUEL[nz] === 'petrol') {
      petrolDispensed += raw; petrolTest += test; petrolSold += sold;
    } else {
      dieselDispensed += raw; dieselTest += test; dieselSold += sold;
    }
  });
  const rates = shift.rates || { petrol: 0, diesel: 0 };
  const expectedRevenue = petrolSold * (rates.petrol||0) + dieselSold * (rates.diesel||0);
  const cashAmount = parseFloat(shift.cashAmount) || 0;
  const upiAmount = parseFloat(shift.upiAmount) || 0;
  const hpPayAmount = parseFloat(shift.hpPayAmount) || 0;
  const udhariAmount = parseFloat(shift.udhariAmount) || 0;
  const totalAccounted = cashAmount + upiAmount + hpPayAmount + udhariAmount;
  const variance = totalAccounted - expectedRevenue;
  return {
    petrolLiters: petrolSold, dieselLiters: dieselSold, totalLiters: petrolSold + dieselSold,
    petrolDispensed, dieselDispensed, totalDispensed: petrolDispensed + dieselDispensed,
    petrolTest, dieselTest, totalTest: petrolTest + dieselTest,
    expectedRevenue, cashAmount, upiAmount, hpPayAmount, udhariAmount, totalAccounted, variance
  };
}
function computeDayTotals(date) {
  const rec = state.dailyRecords[date];
  const empty = { petrolLiters:0, dieselLiters:0, totalLiters:0, totalTest:0, expectedRevenue:0, cashAmount:0, upiAmount:0, hpPayAmount:0, udhariAmount:0, totalAccounted:0, variance:0, expenseTotal:0, netVariance:0, hasData:false };
  if (!rec) return empty;
  let out = { petrolLiters:0, dieselLiters:0, totalLiters:0, totalTest:0, expectedRevenue:0, cashAmount:0, upiAmount:0, hpPayAmount:0, udhariAmount:0, totalAccounted:0, variance:0, expenseTotal:0, netVariance:0, hasData:false };
  ['morning','evening'].forEach(shiftName => {
    const shift = rec[shiftName];
    if (shift) {
      out.hasData = true;
      const t = computeShiftTotals(shift);
      out.petrolLiters += t.petrolLiters;
      out.dieselLiters += t.dieselLiters;
      out.totalLiters += t.totalLiters;
      out.totalTest += t.totalTest;
      out.expectedRevenue += t.expectedRevenue;
      out.cashAmount += t.cashAmount;
      out.upiAmount += t.upiAmount;
      out.hpPayAmount += t.hpPayAmount;
      out.udhariAmount += t.udhariAmount;
      out.totalAccounted += t.totalAccounted;
    }
  });
  out.variance = out.totalAccounted - out.expectedRevenue;
  out.expenseTotal = computeDayExpenseTotal(date);
  out.netVariance = out.totalAccounted + out.expenseTotal - out.expectedRevenue;
  return out;
}
function consumeFIFO(lots, dispensedLiters, soldLiters, rate) {
  let remaining = dispensedLiters;
  let cost = 0;
  for (const lot of lots) {
    if (remaining <= 0) break;
    if (lot.remaining <= 0) continue;
    const take = Math.min(lot.remaining, remaining);
    cost += take * lot.cost;
    lot.remaining -= take;
    remaining -= take;
  }
  const revenue = soldLiters * rate;
  return revenue - cost;
}
function runFIFOEngine() {
  const deliveriesArr = Object.values(state.deliveries);
  const dateSet = new Set([...Object.keys(state.dailyRecords), ...deliveriesArr.map(d => d.date)]);
  const sortedDates = Array.from(dateSet).sort();
  const petrolLots = deliveriesArr.filter(d => d.fuelType === 'petrol')
    .slice().sort((a,b) => a.date.localeCompare(b.date))
    .map(d => ({ id: d.id, remaining: parseFloat(d.liters)||0, cost: parseFloat(d.costPerLiter)||0 }));
  const dieselLots = deliveriesArr.filter(d => d.fuelType === 'diesel')
    .slice().sort((a,b) => a.date.localeCompare(b.date))
    .map(d => ({ id: d.id, remaining: parseFloat(d.liters)||0, cost: parseFloat(d.costPerLiter)||0 }));

  const perDateProfit = {};
  for (const date of sortedDates) {
    let dayProfit = 0;
    const rec = state.dailyRecords[date];
    if (rec) {
      ['morning','evening'].forEach(shiftName => {
        const shift = rec[shiftName];
        if (!shift) return;
        const totals = computeShiftTotals(shift);
        if (totals.petrolDispensed > 0) dayProfit += consumeFIFO(petrolLots, totals.petrolDispensed, totals.petrolLiters, (shift.rates && shift.rates.petrol) || 0);
        if (totals.dieselDispensed > 0) dayProfit += consumeFIFO(dieselLots, totals.dieselDispensed, totals.dieselLiters, (shift.rates && shift.rates.diesel) || 0);
      });
    }
    perDateProfit[date] = dayProfit;
  }
  const lotRemaining = {};
  [...petrolLots, ...dieselLots].forEach(lot => { lotRemaining[lot.id] = lot.remaining; });
  return { perDateProfit, lotRemaining };
}
function getBookStock(fuelType, uptoDate) {
  const initial = fuelType === 'petrol' ? (parseFloat(state.settings.initialPetrolStock) || 0) : (parseFloat(state.settings.initialDieselStock) || 0);
  const delivered = Object.values(state.deliveries)
    .filter(d => d.fuelType === fuelType && d.date <= uptoDate)
    .reduce((sum,d) => sum + (parseFloat(d.liters)||0), 0);
  let dispensed = 0;
  Object.keys(state.dailyRecords).forEach(date => {
    if (date <= uptoDate) {
      const rec = state.dailyRecords[date];
      ['morning','evening'].forEach(shiftName => {
        const shift = rec[shiftName];
        if (shift) {
          const t = computeShiftTotals(shift);
          dispensed += (fuelType === 'petrol') ? t.petrolDispensed : t.dieselDispensed;
        }
      });
    }
  });
  return initial + delivered - dispensed;
}
function getRemainingStock() {
  let petrolDelivered = 0, dieselDelivered = 0;
  Object.values(state.deliveries).forEach(function(d) {
    if (d.fuelType === 'petrol') petrolDelivered += (parseFloat(d.liters) || 0);
    else dieselDelivered += (parseFloat(d.liters) || 0);
  });
  let petrolDispensed = 0, dieselDispensed = 0;
  Object.keys(state.dailyRecords).forEach(function(date) {
    const rec = state.dailyRecords[date];
    ['morning', 'evening'].forEach(function(shiftName) {
      const shift = rec[shiftName];
      if (shift) {
        const t = computeShiftTotals(shift);
        petrolDispensed += t.petrolDispensed;
        dieselDispensed += t.dieselDispensed;
      }
    });
  });
  const initialPetrol = parseFloat(state.settings.initialPetrolStock) || 0;
  const initialDiesel = parseFloat(state.settings.initialDieselStock) || 0;
  return {
    petrol: initialPetrol + petrolDelivered - petrolDispensed,
    diesel: initialDiesel + dieselDelivered - dieselDispensed
  };
}
function interpolateDip(table, x) {
  if (x === null || x === undefined || isNaN(x)) return 0;
  if (x <= table[0][0]) return table[0][1];
  if (x >= table[table.length-1][0]) return table[table.length-1][1];
  for (let i = 0; i < table.length - 1; i++) {
    const [x0,y0] = table[i], [x1,y1] = table[i+1];
    if (x >= x0 && x <= x1) {
      return y0 + (y1 - y0) * (x - x0) / (x1 - x0);
    }
  }
  return table[table.length-1][1];
}
function getMonthlyProfit(monthKeyStr) {
  const { perDateProfit } = runFIFOEngine();
  let total = 0;
  Object.keys(perDateProfit).forEach(date => {
    if (monthKey(date) === monthKeyStr) total += perDateProfit[date];
  });
  return total;
}
function getMonthlyExpenses(monthKeyStr) {
  let total = 0;
  Object.keys(state.dailyRecords).forEach(date => {
    if (monthKey(date) === monthKeyStr) {
      total += computeDayExpenseTotal(date);
    }
  });
  return total;
}
function getMonthlyNetProfit(monthKeyStr) {
  return getMonthlyProfit(monthKeyStr) - getMonthlyExpenses(monthKeyStr);
}
function getMonthlyUdhari(monthKeyStr) {
  let total = 0;
  Object.keys(state.dailyRecords).forEach(date => {
    if (monthKey(date) === monthKeyStr) {
      total += computeDayTotals(date).udhariAmount;
    }
  });
  return total;
}
function computeDayExpenseTotal(date) {
  const rec = state.dailyRecords[date];
  if (!rec || !rec.expenses) return 0;
  return Object.values(rec.expenses).reduce((sum, ex) => sum + (parseFloat(ex.amount) || 0), 0);
}

function deleteCustomer(id) {
  if (!confirm('Delete this customer and their entire udhari history? This cannot be undone.')) return;
  delete state.customers[id];
  if (expandedCustomerId === id) expandedCustomerId = null;
  saveStateLocalOnly();
  queueFieldSync('customers.' + id, firebase.firestore.FieldValue.delete());
  render();
}
function getDayRateForFuelType(date, fuelType) {
  const rec = state.dailyRecords[date];
  if (!rec) return null;
  if (rec.morning && rec.morning.rates && isValidRateValue(rec.morning.rates[fuelType])) return parseFloat(rec.morning.rates[fuelType]);
  if (rec.evening && rec.evening.rates && isValidRateValue(rec.evening.rates[fuelType])) return parseFloat(rec.evening.rates[fuelType]);
  return null;
}
function addCustomerTransaction(customerId, type, date, amount, extra) {
  const amt = parseFloat(amount);
  if (isNaN(amt) || amt <= 0) {
    alert('Please enter a valid amount.');
    return;
  }
  const c = state.customers[customerId];
  if (!c) return;
  if (!c.transactions) c.transactions = {};
  const txId = uid();
  const tx = { id: txId, type: type, date: date, amount: amt };
  if (type === 'given') {
    const fuelType = (extra && extra.fuelType) || 'petrol';
    const rate = getDayRateForFuelType(date, fuelType);
    tx.fuelType = fuelType;
    tx.liters = (rate && rate > 0) ? (amt / rate) : null;
  } else {
    tx.mode = (extra && extra.mode) || 'Cash';
  }
  c.transactions[txId] = tx;
  saveStateLocalOnly();
  queueFieldSync('customers.' + customerId + '.transactions.' + txId, tx);
  render();
}
function deleteCustomerTransaction(customerId, txId) {
  const c = state.customers[customerId];
  if (!c || !c.transactions) return;
  delete c.transactions[txId];
  saveStateLocalOnly();
  queueFieldSync('customers.' + customerId + '.transactions.' + txId, firebase.firestore.FieldValue.delete());
  render();
}
function getCustomerTotals(customerId) {
  const c = state.customers[customerId];
  if (!c || !c.transactions) return { given: 0, repaid: 0, balance: 0 };
  let given = 0, repaid = 0;
  Object.values(c.transactions).forEach(function(tx) {
    if (tx.type === 'given') given += parseFloat(tx.amount) || 0;
    else repaid += parseFloat(tx.amount) || 0;
  });
  return { given: given, repaid: repaid, balance: given - repaid };
}
function getTotalOutstandingUdhari() {
  let total = 0;
  Object.keys(state.customers).forEach(function(id) {
    total += getCustomerTotals(id).balance;
  });
  return total;
}
function getTotalUdhariGivenAllTime() {
  let total = 0;
  Object.keys(state.customers).forEach(function(id) {
    total += getCustomerTotals(id).given;
  });
  return total;
}
function shiftHasRealData(shift) {
  if (!shift) return false;
  if (shift.cashAmount !== null && shift.cashAmount !== undefined) return true;
  if (shift.upiAmount !== null && shift.upiAmount !== undefined) return true;
  if (shift.hpPayAmount !== null && shift.hpPayAmount !== undefined) return true;
  if (shift.udhariAmount !== null && shift.udhariAmount !== undefined) return true;
  if (shift.nozzles) {
    for (let i = 0; i < NOZZLES.length; i++) {
      const n = shift.nozzles[NOZZLES[i]];
      if (n && ((n.start !== null && n.start !== undefined) || (n.end !== null && n.end !== undefined))) return true;
    }
  }
  return false;
}
function getLatestEntryDate() {
  const dates = Object.keys(state.dailyRecords).filter(function(d) {
    const rec = state.dailyRecords[d];
    if (!rec) return false;
    const hasExpenses = rec.expenses && Object.keys(rec.expenses).length > 0;
    const hasDip = rec.dip && ((rec.dip.petrolDipCm !== null && rec.dip.petrolDipCm !== undefined) || (rec.dip.dieselDipMm !== null && rec.dip.dieselDipMm !== undefined));
    return shiftHasRealData(rec.morning) || shiftHasRealData(rec.evening) || hasExpenses || hasDip;
  }).sort();
  if (dates.length === 0) return todayStr();
  return dates[dates.length - 1];
}
function getMonthlyRevenue(monthKeyStr) {
  let total = 0;
  Object.keys(state.dailyRecords).forEach(function(date) {
    if (monthKey(date) === monthKeyStr) {
      total += computeDayTotals(date).expectedRevenue;
    }
  });
  return total;
}

/* =========================================================
   BUSINESS SUMMARY REPORT / WHATSAPP SHARE
========================================================= */
function toDateStr(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function daysBetweenInclusive(start, end) {
  const s = new Date(start + 'T00:00:00'), e = new Date(end + 'T00:00:00');
  return Math.round((e - s) / (1000 * 60 * 60 * 24)) + 1;
}
function getDateRangeForPeriod(period) {
  const today = todayStr();
  if (period === 'custom') return { start: customSummaryStart, end: customSummaryEnd };
  const d = new Date();
  let start;
  if (period === 'week') { d.setDate(d.getDate() - 6); start = toDateStr(d); }
  else if (period === 'month') { d.setDate(d.getDate() - 29); start = toDateStr(d); }
  else if (period === 'quarter') { d.setDate(d.getDate() - 89); start = toDateStr(d); }
  else if (period === 'year') { d.setDate(d.getDate() - 364); start = toDateStr(d); }
  else { start = today; }
  return { start: start, end: today };
}
function computePeriodSummary(startDate, endDate) {
  const { perDateProfit } = runFIFOEngine();
  let revenue = 0, expense = 0, grossProfit = 0, petrolL = 0, dieselL = 0, totalCash = 0, totalUpi = 0;
  Object.keys(state.dailyRecords).forEach(function(date) {
    if (date >= startDate && date <= endDate) {
      const totals = computeDayTotals(date);
      revenue += totals.expectedRevenue;
      expense += totals.expenseTotal;
      petrolL += totals.petrolLiters;
      dieselL += totals.dieselLiters;
      totalCash += totals.cashAmount;
      totalUpi += totals.upiAmount;
      grossProfit += (perDateProfit[date] || 0);
    }
  });
  const netProfit = grossProfit - expense;
  const daysInRange = Math.max(1, daysBetweenInclusive(startDate, endDate));
  const stock = getRemainingStock();
  const totalUdhari = getTotalUdhariGivenAllTime();
  const outstandingUdhari = getTotalOutstandingUdhari();
  return { revenue, expense, grossProfit, netProfit, petrolL, dieselL, daysInRange, totalCash, totalUpi, remainingPetrolStock: stock.petrol, remainingDieselStock: stock.diesel, totalUdhari, outstandingUdhari};
}
function onSummaryPeriodChange(period) {
  selectedSummaryPeriod = period;
  render();
}
function onCustomSummaryDateChange(which, value) {
  if (which === 'start') customSummaryStart = value;
  else customSummaryEnd = value;
  render();
}
function shareReportToWhatsApp() {
  const range = getDateRangeForPeriod(selectedSummaryPeriod);
  const s = computePeriodSummary(range.start, range.end);
  const text =
    '*SBS Filling Station – Business Report*\n' +
    formatDateDisplay(range.start) + ' to ' + formatDateDisplay(range.end) + '\n\n' +
    'Total Revenue: ' + formatCurrency(s.revenue) + '\n' +
    'Total Expenses: ' + formatCurrency(s.expense) + '\n' +
    'Profit (before salary): ' + formatCurrency(s.netProfit) + '\n' +
    'Salary Adjusted Profit: ' + formatCurrency(s.profitAfterSalary) + '\n\n' +
    'Cash Received: ' + formatCurrency(s.totalCash) + '\n' +
    'UPI Received: ' + formatCurrency(s.totalUpi) + '\n\n' +
    'Petrol Sold: ' + formatNum(s.petrolL) + ' L\n' +
    'Diesel Sold: ' + formatNum(s.dieselL) + ' L\n\n' +
    'Remaining Petrol Stock: ' + formatNum(s.remainingPetrolStock) + ' L\n' +
    'Remaining Diesel Stock: ' + formatNum(s.remainingDieselStock) + ' L';
  const encoded = encodeURIComponent(text);
  window.open('https://wa.me/?text=' + encoded, '_blank');
}

/* =========================================================
   CRASH SAFETY NET & RECOVERY (WITH HOISTING GUARD)
========================================================= */
function forceHidePreloader() {
  try {
    const loaders = document.querySelectorAll('#preloader, .loader, .spinner, [id*="loading"], [class*="loader"]');
    loaders.forEach(el => {
      el.style.display = 'none';
      el.style.opacity = '0';
      el.style.visibility = 'hidden';
    });
  } catch (e) {}
}

function showCrashScreen(err) {
  // 🛡️ HOISTING GUARD: Prevents 'Cannot access before initialization' error
  if (typeof isCrashHandled !== 'undefined' && isCrashHandled) return;
  if (typeof isCrashHandled !== 'undefined') isCrashHandled = true;

  forceHidePreloader();
  console.error('CRASH INTERCEPTED BY SAFETY NET:', err);

  let app;
  try {
    app = document.getElementById('app');
  } catch (e) { return; }
  
  if (!app) return;

  const message = (err && (err.message || err.toString())) ? (err.message || err.toString()) : 'Unknown System Error';

  app.innerHTML = `
  <div class="min-h-screen flex items-center justify-center p-6 bg-[#EEF1F5]">
    <div class="bg-white rounded-2xl card-shadow p-8 max-w-md w-full text-center">

      <p class="text-sm text-[#5A6B82] mb-1">Aapka data safe hai — ye sirf ek display error hai.</p>
      <p class="text-[11px] text-[#5A6B82] mb-5 break-words">${escapeHtml(message)}</p>
      <div class="flex flex-col gap-2">
        <button onclick="location.reload()" class="bg-[#0A2540] text-white font-bold px-5 py-2.5 rounded-lg hover:bg-slate-800 transition-all">🔄 Page Reload Karein</button>
        <button onclick="recoverToDashboard()" class="bg-[#F5A623] text-[#0A2540] font-bold px-5 py-2.5 rounded-lg hover:bg-amber-500 transition-all">🏠 Dashboard Pe Jaayein</button>
      </div>
    </div>
  </div>`;
}

  try {
    if (typeof isCrashHandled !== 'undefined') isCrashHandled = false; // Reset guard for fresh render

function updateDashboardComputedUI() {
  const today = getLatestEntryDate();
  const dayTotals = computeDayTotals(today);
  const monthlyRevenue = getMonthlyRevenue(monthKey(today));
  const monthlyGrossProfit = getMonthlyProfit(monthKey(today));
  const monthlyExpenses = getMonthlyExpenses(monthKey(today));
  const monthlyNetProfit = monthlyGrossProfit - monthlyExpenses;
  const monthlyUdhari = getMonthlyUdhari(monthKey(today));
  const totalUdhariGiven = getTotalUdhariGivenAllTime();
  const remainingUdhari = getTotalOutstandingUdhari();
  const litersEl = document.getElementById('dashLitersToday');
  const revEl = document.getElementById('dashRevenueToday');
  const cashEl = document.getElementById('dashCashStatus');
  const todayExpenseEl = document.getElementById('dashTodayExpense');
  const monthlyRevenueEl = document.getElementById('dashMonthlyRevenue');
  const monthlyExpenseEl = document.getElementById('dashMonthlyExpense');
  const profitEl = document.getElementById('dashMonthlyProfit');
  const profitBreakdownEl = document.getElementById('dashMonthlyProfitBreakdown');
  const udhariEl = document.getElementById('dashMonthlyUdhari');
  const totalUdhariEl = document.getElementById('dashTotalUdhari');
  const remainingUdhariEl = document.getElementById('dashRemainingUdhari');
  if (litersEl) litersEl.textContent = formatNum(dayTotals.totalLiters) + ' L';
  if (revEl) revEl.textContent = formatCurrency(dayTotals.expectedRevenue);
  if (cashEl) {
    cashEl.textContent = dayTotals.netVariance < 0 ? `Shortage: ${formatCurrency(Math.abs(dayTotals.netVariance))}` : `Surplus/Balanced: ${formatCurrency(dayTotals.netVariance)}`;
    cashEl.className = 'text-lg sm:text-xl font-extrabold mt-1 ' + (dayTotals.netVariance < 0 ? 'text-rose-400' : 'text-emerald-400');
  }
  if (todayExpenseEl) todayExpenseEl.textContent = formatCurrency(dayTotals.expenseTotal);
  if (monthlyRevenueEl) monthlyRevenueEl.textContent = formatCurrency(monthlyRevenue);
  if (monthlyExpenseEl) monthlyExpenseEl.textContent = formatCurrency(monthlyExpenses);
  if (profitEl) profitEl.textContent = formatCurrency(monthlyNetProfit);
  if (profitBreakdownEl) profitBreakdownEl.textContent = `Gross ${formatCurrency(monthlyGrossProfit)} \u2212 Expenses ${formatCurrency(monthlyExpenses)}`;
  if (udhariEl) udhariEl.textContent = formatCurrency(monthlyUdhari);
  if (totalUdhariEl) totalUdhariEl.textContent = formatCurrency(totalUdhariGiven);
  if (remainingUdhariEl) {

    remainingUdhariEl.className = 'text-2xl font-extrabold mt-1 ' + (remainingUdhari > 0 ? 'text-red-600' : 'text-emerald-600');
  }
}

function computeDeliveryShortage(d) {
  if (d.dipBefore === undefined || d.dipBefore === null || d.dipBefore === '' ||
      d.dipAfter === undefined || d.dipAfter === null || d.dipAfter === '') {
    return null;
  }
  const table = d.fuelType === 'petrol' ? PETROL_DIP_TABLE : DIESEL_DIP_TABLE;
  const before = interpolateDip(table, parseFloat(d.dipBefore));
  const after = interpolateDip(table, parseFloat(d.dipAfter));
  const actualReceived = after - before;
  const shortage = (parseFloat(d.liters) || 0) - actualReceived;
  return { actualReceived: actualReceived, shortage: shortage };
}
function renderDeliveries() {
  const { lotRemaining } = runFIFOEngine();

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-semibold text-[#5A6B82]">Initial Petrol Stock (L)</label>
          <input id="initialPetrolStockInput" type="number" step="0.01" class="num-input mt-1 w-full border border-[#DCE3EC] rounded-lg px-3 py-2 font-semibold"

          <input id="initialDieselStockInput" type="number" step="0.01" class="num-input mt-1 w-full border border-[#DCE3EC] rounded-lg px-3 py-2 font-semibold"
            value="${state.settings.initialDieselStock}" oninput="onInitialStockInput('diesel', this.value)">

      </div>

    <div class="bg-white rounded-2xl card-shadow p-4 sm:p-5">

        <div>
          <label class="text-xs font-semibold text-[#5A6B82]">Date</label>
          <input id="deliveryDate" type="date" value="${todayStr()}" class="mt-1 w-full border border-[#DCE3EC] rounded-lg px-3 py-2">
        </div>
        <div>
          <label class="text-xs font-semibold text-[#5A6B82]">Fuel Type</label>
          <select id="deliveryFuelType" class="mt-1 w-full border border-[#DCE3EC] rounded-lg px-3 py-2">

        </div>
        <div>
          <label class="text-xs font-semibold text-[#5A6B82]">Liters Received (Invoice)</label>

        <div>

                <td class="py-2 pr-2">${formatCurrency(d.costPerLiter)}</td>

}
function onInitialStockInput(fuelType, value) {
  const v = parseFloat(value);
  const val = isNaN(v) ? 0 : v;
  if (fuelType === 'petrol') state.settings.initialPetrolStock = val;
  else state.settings.initialDieselStock = val;
  saveStateLocalOnly();
  queueFieldSync('settings.initial' + (fuelType === 'petrol' ? 'Petrol' : 'Diesel') + 'Stock', val);
  updateRemainingStockUI();
}
function updateRemainingStockUI() {
  const stock = getRemainingStock();
  const petrolEl = document.getElementById('remainingPetrolStockDisplay');
  const dieselEl = document.getElementById('remainingDieselStockDisplay');
  if (petrolEl) petrolEl.textContent = formatNum(stock.petrol) + ' L';
  if (dieselEl) dieselEl.textContent = formatNum(stock.diesel) + ' L';
}
function addDelivery() {
  const date = document.getElementById('deliveryDate').value;
  const fuelType = document.getElementById('deliveryFuelType').value;
  const litersVal = parseFloat(document.getElementById('deliveryLiters').value);
  const costVal = parseFloat(document.getElementById('deliveryCost').value);
  const dipBeforeRaw = document.getElementById('deliveryDipBefore').value;
  const dipAfterRaw = document.getElementById('deliveryDipAfter').value;
  if (!date || isNaN(litersVal) || litersVal <= 0 || isNaN(costVal) || costVal <= 0) {
    alert('Please fill in a valid date, liters received, and cost price.');
    return;
  }
  const id = uid();
  const delivery = {
    id: id, date: date, fuelType: fuelType, liters: litersVal, costPerLiter: costVal,
    dipBefore: dipBeforeRaw === '' ? null : parseFloat(dipBeforeRaw),
    dipAfter: dipAfterRaw === '' ? null : parseFloat(dipAfterRaw)
  };
  state.deliveries[id] = delivery;
  saveStateLocalOnly();
  queueFieldSync('deliveries.' + id, delivery);
  render();
}
function deleteLot(id) {
  if (!confirm('Delete this delivery lot? This will affect FIFO profit and stock calculations.')) return;
  delete state.deliveries[id];
  saveStateLocalOnly();
  queueFieldSync('deliveries.' + id, firebase.firestore.FieldValue.delete());
  render();
}

/* =========================================================
   RENDER: TANK DIP
========================================================= */
function renderDip() {
  const date = selectedDipDate;
  const rec = ensureRecord(date);
  if (!rec.dip) {
    rec.dip = { petrolDipCm: null, dieselDipMm: null };
    saveStateLocalOnly();
    queueFieldSync('dailyRecords.' + date + '.dip', rec.dip);
  } else {
    saveStateLocalOnly();
  }

  const petrolActual = interpolateDip(PETROL_DIP_TABLE, parseFloat(rec.dip.petrolDipCm));
  const dieselActual = interpolateDip(DIESEL_DIP_TABLE, parseFloat(rec.dip.dieselDipMm));
  const petrolBook = getBookStock('petrol', date);
  const dieselBook = getBookStock('diesel', date);
  const petrolVariance = (rec.dip.petrolDipCm !== null && rec.dip.petrolDipCm !== '' && !isNaN(parseFloat(rec.dip.petrolDipCm))) ? petrolActual - petrolBook : null;
  const dieselVariance = (rec.dip.dieselDipMm !== null && rec.dip.dieselDipMm !== '' && !isNaN(parseFloat(rec.dip.dieselDipMm))) ? dieselActual - dieselBook : null;

  return `
  <div class="space-y-4">
    <div class="bg-white rounded-2xl card-shadow p-4 flex items-center gap-3">
      <div>
        <label class="text-xs font-semibold text-[#5A6B82]">Select Date</label>
        <input type="date" value="${date}" onchange="onDipDateChange(this.value)"
          class="block mt-1 border border-[#DCE3EC] rounded-lg px-3 py-2 font-semibold">
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="bg-white rounded-2xl card-shadow p-4 sm:p-5">
        <h2 class="text-base font-bold mb-3 text-orange-700">Petrol Tank (22 KL)</h2>
        <label class="text-xs font-semibold text-[#5A6B82]">Manual Dip Reading (CMS)</label>
        <input type="number" step="0.1" class="num-input mt-1 w-full border border-[#DCE3EC] rounded-lg px-3 py-2 font-semibold"
          value="${rec.dip.petrolDipCm === null ? '' : rec.dip.petrolDipCm}"
          oninput="onDipInput('${date}','petrolDipCm', this.value)" placeholder="e.g. 120.5">
        <div class="grid grid-cols-3 gap-2 mt-4 text-center">
          <div class="bg-[#EEF1F5] rounded-lg p-2">
            <div class="text-[10px] text-[#5A6B82] uppercase">Book Stock</div>
            <div id="petrolBookStock" class="font-bold">${formatNum(petrolBook)} L</div>
          </div>
          <div class="bg-[#EEF1F5] rounded-lg p-2">
            <div class="text-[10px] text-[#5A6B82] uppercase">Actual (Dip)</div>
            <div id="petrolActualStock" class="font-bold">${formatNum(petrolActual)} L</div>
          </div>
          <div class="bg-[#EEF1F5] rounded-lg p-2">
            <div class="text-[10px] text-[#5A6B82] uppercase">Variance</div>
            <div id="petrolVarianceDisplay" class="font-bold ${petrolVariance === null ? '' : (petrolVariance < 0 ? 'text-red-600' : 'text-green-600')}">${petrolVariance === null ? '-' : formatNum(petrolVariance) + ' L'}</div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl card-shadow p-4 sm:p-5">
        <h2 class="text-base font-bold mb-3 text-blue-700">Diesel Tank (35 KL)</h2>
        <label class="text-xs font-semibold text-[#5A6B82]">Manual Dip Reading (MM)</label>
        <input type="number" step="0.1" class="num-input mt-1 w-full border border-[#DCE3EC] rounded-lg px-3 py-2 font-semibold"
          value="${rec.dip.dieselDipMm === null ? '' : rec.dip.dieselDipMm}"
          oninput="onDipInput('${date}','dieselDipMm', this.value)" placeholder="e.g. 850">
        <div class="grid grid-cols-3 gap-2 mt-4 text-center">
          <div class="bg-[#EEF1F5] rounded-lg p-2">
            <div class="text-[10px] text-[#5A6B82] uppercase">Book Stock</div>
            <div id="dieselBookStock" class="font-bold">${formatNum(dieselBook)} L</div>
          </div>
          <div class="bg-[#EEF1F5] rounded-lg p-2">
            <div class="text-[10px] text-[#5A6B82] uppercase">Actual (Dip)</div>
            <div id="dieselActualStock" class="font-bold">${formatNum(dieselActual)} L</div>
          </div>
          <div class="bg-[#EEF1F5] rounded-lg p-2">
            <div class="text-[10px] text-[#5A6B82] uppercase">Variance</div>
            <div id="dieselVarianceDisplay" class="font-bold ${dieselVariance === null ? '' : (dieselVariance < 0 ? 'text-red-600' : 'text-green-600')}">${dieselVariance === null ? '-' : formatNum(dieselVariance) + ' L'}</div>
          </div>
        </div>
      </div>
    </div>
    <p class="text-xs text-[#5A6B82] px-1">Book Stock = Cumulative Deliveries &minus; Cumulative Nozzle Sales up to the selected date. Variance = Actual (Dip) &minus; Book Stock.</p>
  </div>`;
}
function onDipDateChange(value) {
  selectedDipDate = value;
  render();
}
function onDipInput(date, field, value) {
  const rec = ensureRecord(date);
  if (!rec.dip) rec.dip = { petrolDipCm: null, dieselDipMm: null };
  const v = value === '' ? null : parseFloat(value);
  rec.dip[field] = (v === null || isNaN(v)) ? null : v;
  saveStateLocalOnly();
  queueFieldSync('dailyRecords.' + date + '.dip.' + field, rec.dip[field]);
  updateDipComputedUI(date);
}
function updateDipComputedUI(date) {
  if (activeTab !== 'dip' || selectedDipDate !== date) return;
  const rec = ensureRecord(date);
  if (!rec.dip) rec.dip = { petrolDipCm: null, dieselDipMm: null };
  const petrolActual = interpolateDip(PETROL_DIP_TABLE, parseFloat(rec.dip.petrolDipCm));
  const dieselActual = interpolateDip(DIESEL_DIP_TABLE, parseFloat(rec.dip.dieselDipMm));
  const petrolBook = getBookStock('petrol', date);
  const dieselBook = getBookStock('diesel', date);
  const petrolVariance = (rec.dip.petrolDipCm !== null && !isNaN(parseFloat(rec.dip.petrolDipCm))) ? petrolActual - petrolBook : null;
  const dieselVariance = (rec.dip.dieselDipMm !== null && !isNaN(parseFloat(rec.dip.dieselDipMm))) ? dieselActual - dieselBook : null;

  const set = (id, text, cls) => { const el = document.getElementById(id); if (el) { el.textContent = text; if (cls !== undefined) el.className = cls; } };
  set('petrolBookStock', formatNum(petrolBook) + ' L');
  set('petrolActualStock', formatNum(petrolActual) + ' L');
  set('petrolVarianceDisplay', petrolVariance === null ? '-' : formatNum(petrolVariance) + ' L', 'font-bold ' + (petrolVariance === null ? '' : (petrolVariance < 0 ? 'text-red-600' : 'text-green-600')));
  set('dieselBookStock', formatNum(dieselBook) + ' L');
  set('dieselActualStock', formatNum(dieselActual) + ' L');
  set('dieselVarianceDisplay', dieselVariance === null ? '-' : formatNum(dieselVariance) + ' L', 'font-bold ' + (dieselVariance === null ? '' : (dieselVariance < 0 ? 'text-red-600' : 'text-green-600')));
}

/* =========================================================
   RENDER: SALARY

  const daysInMonth = getDaysInMonth(monthKeyStr);
  const dailyProrated = daysInMonth > 0 ? totalSalary / daysInMonth : 0;
  const netProfitBeforeSalary = getMonthlyNetProfit(monthKeyStr);
  const profitAfterSalary = netProfitBeforeSalary - totalSalary;
  const totalAdvancesThisMonth = getTotalAdvancesForMonth(monthKeyStr);

  return `
  <div class="space-y-4">
    <div class="bg-white rounded-2xl card-shadow p-4 sm:p-5">
      <h2 class="text-base font-bold mb-3">Add Employee</h2>

        <input id="employeeNameInput" type="text" placeholder="Employee name"
          class="sm:col-span-2 border border-[#DCE3EC] rounded-lg px-3 py-2">
        <div class="flex gap-2">
          <input id="employeeSalaryInput" type="number" step="0.01" placeholder="Monthly Salary ₹"
            class="num-input flex-1 border border-[#DCE3EC] rounded-lg px-3 py-2">
          <button onclick="submitEmployeeForm()" class="bg-[#F5A623] text-[#0A2540] font-bold px-4 py-2 rounded-lg whitespace-nowrap">+ Add</button>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl card-shadow p-4 flex flex-wrap items-center justify-between gap-3 no-print">
      <div>
        <label class="text-xs font-semibold text-[#5A6B82]">Select Month (for advances & profit)</label>
        <input type="month" value="${monthKeyStr}" onchange="onSalaryMonthChange(this.value)"
          class="block mt-1 border border-[#DCE3EC] rounded-lg px-3 py-2 font-semibold">
      </div>
    </div>

    <div class="space-y-3">
      <h2 class="text-sm font-bold text-[#5A6B82] uppercase tracking-wide px-1">Employees &amp; Advances &ndash; ${monthKeyStr}</h2>
      ${employees.length === 0 ? `
        <div class="bg-white rounded-2xl card-shadow p-6 text-center text-[#5A6B82]">No employees added yet. Add one above.</div>
      ` : employees.map(e => renderEmployeeCard(e, monthKeyStr)).join('')}
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="bg-white rounded-2xl card-shadow p-4">
        <div class="text-xs font-semibold text-[#5A6B82] uppercase">Total Monthly Salary</div>
        <div class="text-xl font-extrabold text-red-600 mt-1">${formatCurrency(totalSalary)}</div>
        <div class="text-[11px] text-[#5A6B82] mt-1">${employees.length} employee(s)</div>
      </div>
      <div class="bg-white rounded-2xl card-shadow p-4">
        <div class="text-xs font-semibold text-[#5A6B82] uppercase">Daily Average (Salary)</div>
        <div class="text-xl font-extrabold text-[#0A2540] mt-1">${formatCurrency(dailyProrated)}</div>
        <div class="text-[11px] text-[#5A6B82] mt-1">÷ ${daysInMonth} days in ${monthKeyStr}</div>
      </div>
      <div class="bg-white rounded-2xl card-shadow p-4">
        <div class="text-xs font-semibold text-[#5A6B82] uppercase">Total Advances Paid</div>
        <div class="text-xl font-extrabold text-orange-600 mt-1">${formatCurrency(totalAdvancesThisMonth)}</div>
        <div class="text-[11px] text-[#5A6B82] mt-1">${monthKeyStr}, all employees</div>
      </div>
      <div class="bg-[#0A2540] rounded-2xl card-shadow p-4 text-white">
        <div class="text-xs font-semibold text-blue-200 uppercase">Profit After Salary</div>
        <div class="text-xl font-extrabold mt-1 ${profitAfterSalary < 0 ? 'text-red-400' : 'text-green-400'}">${formatCurrency(profitAfterSalary)}</div>

      </div>
    </div>
    <p class="text-xs text-[#5A6B82] px-1">This "Profit After Salary" figure is shown only on this page. The Dashboard's Monthly Net Profit continues to reflect fuel profit minus daily expenses only (not staff salary), as before.</p>
  </div>`;
}

  const isExpanded = expandedEmployeeId === e.id;
  const advanceGiven = getEmployeeAdvanceTotalForMonth(e.id, monthKeyStr);
  const remainingSalary = (parseFloat(e.monthlySalary) || 0) - advanceGiven;
  const advances = Object.values(e.advances || {}).sort((a,b) => b.date.localeCompare(a.date));

  return `
  <div class="bg-white rounded-2xl card-shadow overflow-hidden">
    <button onclick="toggleEmployeeExpand('${e.id}')" class="w-full flex items-center justify-between p-4 text-left">
      <div>
        <div class="font-bold text-[#0A2540]">${escapeHtml(e.name)}</div>
        <div class="text-[11px] text-[#5A6B82] mt-0.5">Monthly Salary: ${formatCurrency(e.monthlySalary)} &middot; Advance Given: ${formatCurrency(advanceGiven)}</div>
      </div>
      <div class="text-right flex items-center gap-3">
        <div>
          <div class="text-[10px] text-[#5A6B82] uppercase">Remaining</div>
          <div class="font-extrabold ${remainingSalary < 0 ? 'text-red-600' : 'text-emerald-600'}">${formatCurrency(remainingSalary)}</div>

    <div class="border-t border-[#EEF1F5] p-4">
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 mb-4">

        <input id="advAmount_${e.id}" type="number" step="0.01" placeholder="Advance Amount ₹" class="num-input border border-[#DCE3EC] rounded-lg px-3 py-2 text-sm">
        <button onclick="submitAdvanceForm('${e.id}')" class="bg-[#F5A623] text-[#0A2540] font-bold px-3 py-2 rounded-lg text-sm">+ Add Advance</button>
      </div>
      <div class="overflow-x-auto -mx-2 px-2">
        <table class="w-full text-sm min-w-[380px]">
          <thead>
            <tr class="text-left text-[#5A6B82] text-xs uppercase border-b border-[#DCE3EC]">
              <th class="py-2 pr-2">Date</th>
              <th class="py-2 pr-2">Advance Amount</th>
              <th class="py-2 pr-2"></th>
            </tr>
          </thead>

========================================================= */
function openCustomerStatementModal(customerId) {
  statementModalCustomerId = customerId;
  const today = todayStr();
  statementModalStart = monthKey(today) + '-01';
  statementModalEnd = today;
  render();
}
function closeStatementModal() {
  statementModalCustomerId = null;
  render();
}
function onStatementDateChange(which, value) {
  if (which === 'start') statementModalStart = value;
  else statementModalEnd = value;
  render();
}
function getCustomerTransactionsInRange(customerId, startDate, endDate) {
  const c = state.customers[customerId];
  if (!c || !c.transactions) return [];
  return Object.values(c.transactions)
    .filter(tx => tx.date >= startDate && tx.date <= endDate)
    .sort((a, b) => a.date.localeCompare(b.date));
}
function renderStatementModal() {
  const c = state.customers[statementModalCustomerId];
  if (!c) return '';
  const txs = getCustomerTransactionsInRange(statementModalCustomerId, statementModalStart, statementModalEnd);
  const given = txs.filter(t => t.type === 'given');
  const repaid = txs.filter(t => t.type === 'repaid');
  const totalGiven = given.reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
  const totalRepaid = repaid.reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
  const remaining = totalGiven - totalRepaid;

  return `
  <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this) closeStatementModal()">
    <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-bold text-[#0A2540]">Statement &ndash; ${escapeHtml(c.name)}</h2>
        <button onclick="closeStatementModal()" class="text-[#5A6B82] font-bold text-xl leading-none">&times;</button>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label class="text-xs font-semibold text-[#5A6B82]">From</label>
          <input type="date" value="${statementModalStart}" onchange="onStatementDateChange('start', this.value)"
            class="block mt-1 w-full border border-[#DCE3EC] rounded-lg px-3 py-2">
        </div>
        <div>
          <label class="text-xs font-semibold text-[#5A6B82]">To</label>
          <input type="date" value="${statementModalEnd}" onchange="onStatementDateChange('end', this.value)"
            class="block mt-1 w-full border border-[#DCE3EC] rounded-lg px-3 py-2">
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2 mb-4">
        <div class="bg-red-50 rounded-lg p-3 text-center">
          <div class="text-[10px] text-[#5A6B82] uppercase">Udhaari</div>
          <div class="font-extrabold text-red-600">${formatCurrency(totalGiven)}</div>
        </div>
        <div class="bg-emerald-50 rounded-lg p-3 text-center">
          <div class="text-[10px] text-[#5A6B82] uppercase">Payment</div>
          <div class="font-extrabold text-emerald-600">${formatCurrency(totalRepaid)}</div>
        </div>
        <div class="bg-[#EEF1F5] rounded-lg p-3 text-center">
          <div class="text-[10px] text-[#5A6B82] uppercase">Remaining</div>
          <div class="font-extrabold text-[#0A2540]">${formatCurrency(remaining)}</div>
        </div>
      </div>
      <p class="text-xs text-[#5A6B82] mb-4">${given.length} udhaari entries, ${repaid.length} payment entries in this range.</p>
      <button onclick="generateCustomerStatementPDF('${statementModalCustomerId}')" class="w-full bg-[#0A2540] text-white font-bold px-4 py-3 rounded-lg">⬇️ Download Statement PDF</button>
    </div>
  </div>`;
}

function generateCustomerStatementPDF(customerId) {
  try {
    const c = state.customers[customerId];
    if (!c) return;
    const startDate = statementModalStart;
    const endDate = statementModalEnd;
    const txs = getCustomerTransactionsInRange(customerId, startDate, endDate);
    const given = txs.filter(t => t.type === 'given');
    const repaid = txs.filter(t => t.type === 'repaid');
    const totalGiven = given.reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
    const totalRepaid = repaid.reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
    const remaining = totalGiven - totalRepaid;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const pageWidth = 210;
    const marginX = 15;
    let y = 16;

    doc.setFillColor(10, 37, 64);
    doc.rect(0, 0, pageWidth, 3, 'F');

    try { doc.addImage(LOGO_DATA_URI, 'PNG', marginX, y, 20, 16); } catch (e) {}
    try { doc.addImage(HPCL_LOGO_DATA_URI, 'PNG', pageWidth - marginX - 20, y, 20, 16); } catch (e) {}

    doc.setTextColor(10, 37, 64);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.text('SBS FILLING STATION', pageWidth / 2, y + 7, { align: 'center' });
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(90, 107, 130);
    doc.text('Hindustan Petroleum Dealer', pageWidth / 2, y + 13, { align: 'center' });
    doc.text('Ph: 9824610379', pageWidth / 2, y + 18, { align: 'center' });

    y += 28;
    doc.setDrawColor(220, 227, 236);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 8;

    doc.setFontSize(10);
    doc.setTextColor(10, 37, 64);
    doc.setFont('helvetica', 'bold');
    doc.text('Billed To (Party Name):', marginX, y);
    doc.setFont('helvetica', 'normal');
    doc.text(c.name, marginX + 42, y);
    doc.setFont('helvetica', 'bold');
    doc.text('Statement Date:', pageWidth - marginX - 45, y);
    doc.setFont('helvetica', 'normal');
    doc.text(formatDateDisplay(todayStr()), pageWidth - marginX - 15, y);

    y += 5;
    doc.setFontSize(9);
    doc.setTextColor(90, 107, 130);
    doc.text('Statement Period: ' + formatDateDisplay(startDate) + ' to ' + formatDateDisplay(endDate), marginX, y);

    y += 8;
    const boxWidth = (pageWidth - 2 * marginX - 8) / 3;
    function summaryBox(x, label, value, color) {
      doc.setFillColor(color[0], color[1], color[2]);
      doc.roundedRect(x, y, boxWidth, 18, 2, 2, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'bold');
      doc.text(label, x + boxWidth / 2, y + 6, { align: 'center' });
      doc.setFontSize(12);
      doc.text('Rs ' + formatNum(value), x + boxWidth / 2, y + 13, { align: 'center' });
    }
    summaryBox(marginX, 'TOTAL UDHAARI (CREDIT)', totalGiven, [220, 38, 38]);
    summaryBox(marginX + boxWidth + 4, 'TOTAL PAYMENT RECEIVED', totalRepaid, [5, 150, 105]);
    summaryBox(marginX + 2 * (boxWidth + 4), 'REMAINING BALANCE', remaining, [10, 37, 64]);

    y += 26;
    doc.setTextColor(10, 37, 64);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text('CREDIT DETAILS (UDHAARI)', marginX, y);
    y += 3;

    const creditRows = given.map(t => [
      formatDateDisplay(t.date),
      (t.fuelType || 'petrol').charAt(0).toUpperCase() + (t.fuelType || 'petrol').slice(1),
      t.liters ? formatNum(t.liters) : '-',
      formatNum(t.amount)
    ]);
    doc.autoTable({
      startY: y,
      margin: { left: marginX, right: marginX },
      head: [['Date', 'Fuel Type', 'Quantity (Litres)', 'Amount (Rs)']],
      body: creditRows.length ? creditRows : [['-', '-', '-', '-']],
      foot: [['', '', 'Total Udhaari', formatNum(totalGiven)]],
      theme: 'grid',
      headStyles: { fillColor: [10, 37, 64], textColor: 255, fontStyle: 'bold', fontSize: 9 },
      footStyles: { fillColor: [238, 241, 245], textColor: [10, 37, 64], fontStyle: 'bold', fontSize: 9 },
      bodyStyles: { fontSize: 9, textColor: [30, 41, 59] },
      styles: { cellPadding: 2.5 }
    });

    y = doc.lastAutoTable.finalY + 8;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.setTextColor(10, 37, 64);
    doc.text('PAYMENT RECEIVED (JAMA)', marginX, y);
    y += 3;

    const paymentRows = repaid.map(t => [
      formatDateDisplay(t.date),
      t.mode || 'Cash',
      formatNum(t.amount)
    ]);
    doc.autoTable({
      startY: y,
      margin: { left: marginX, right: marginX },
      head: [['Date', 'Mode of Payment', 'Amount Paid (Rs)']],
      body: paymentRows.length ? paymentRows : [['-', '-', '-']],
      foot: [['', 'Total Paid', formatNum(totalRepaid)]],
      theme: 'grid',
      headStyles: { fillColor: [10, 37, 64], textColor: 255, fontStyle: 'bold', fontSize: 9 },
      footStyles: { fillColor: [238, 241, 245], textColor: [10, 37, 64], fontStyle: 'bold', fontSize: 9 },
      bodyStyles: { fontSize: 9, textColor: [30, 41, 59] },
      styles: { cellPadding: 2.5 }
    });

    y = doc.lastAutoTable.finalY + 10;
    if (y > 260) { doc.addPage(); y = 20; }
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(9);
    doc.setTextColor(150, 60, 30);
    doc.text('* Please clear the dues on time.', marginX, y);

    y += 18;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(10, 37, 64);
    doc.text('For SBS FILLING STATION', marginX, y);

    doc.setFont('helvetica', 'italic');
    doc.setFontSize(16);
    doc.setTextColor(10, 37, 64);
    doc.text('Akshay', pageWidth - marginX - 30, y - 2);
    doc.setDrawColor(10, 37, 64);
    doc.line(pageWidth - marginX - 40, y + 2, pageWidth - marginX, y + 2);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text('Authorized Signatory', pageWidth - marginX - 40, y + 7);

    const fileName = 'Statement_' + c.name.replace(/[^a-zA-Z0-9]/g, '_') + '_' + todayStr() + '.pdf';
    doc.save(fileName);
  } catch (err) {
    console.error('PDF generation failed', err);
    alert('PDF banane mein dikkat aayi: ' + err.message);
  }
}

// Indian Currency Format Helper Function
function formatPdfCurrency(val) {
  const num = parseFloat(val) || 0;
  return 'Rs. ' + num.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);

        fontStyle: 'bold', 
        fontSize: 10.5,
        cellPadding: 4

        fontSize: 10, 
        textColor: [30, 41, 59],
        cellPadding: 4

    });

  } catch (err) {

    alert('Summary PDF generate hone mein issue aaya: ' + err.message);

}

function generateExpensesPDF() {
  try {
    const range = getDateRangeForPeriod(selectedSummaryPeriod);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const pageWidth = 210;

    // --- Red Header Section ---
    doc.setFillColor(185, 28, 28);
    doc.rect(0, 0, pageWidth, 28, 'F');

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.setTextColor(255, 255, 255);
    doc.text('SBS FILLING STATION', pageWidth / 2, 12, { align: 'center' });

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9.5);
    doc.setTextColor(254, 226, 226);
    doc.text('DAILY EXPENSES & OUTFLOW REPORT', pageWidth / 2, 18, { align: 'center' });

    doc.setFontSize(8.5);
    doc.setTextColor(254, 242, 242);
    doc.text(`Period: ${formatDateDisplay(range.start)} to ${formatDateDisplay(range.end)}`, pageWidth / 2, 23, { align: 'center' });

    let expenseRows = [];
    let grandTotal = 0;

    const dates = Object.keys(state.dailyRecords).sort();
    dates.forEach(date => {
      if (date >= range.start && date <= range.end) {
        const rec = state.dailyRecords[date];
        if (rec && rec.expenses && Object.keys(rec.expenses).length > 0) {
          Object.values(rec.expenses).forEach(ex => {
            const amt = parseFloat(ex.amount) || 0;
            grandTotal += amt;
            expenseRows.push([
              formatDateDisplay(date),
              ex.description || 'General Expense',
              formatPdfCurrency(amt)
            ]);
          });
        }
      }

function downloadBackup() {
  try {
    const payload = JSON.stringify(state, null, 2);
    const blob = new Blob([payload], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'sbs-filling-station-backup-' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Backup download failed: ' + e.message);
  }
}

function restoreBackup(file) {
  if (!file) return;
  if (!confirm('This will REPLACE all current data (on every synced device) with the backup file. Are you sure?')) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed || typeof parsed !== 'object') throw new Error('Invalid backup file');
      state = Object.assign(defaultState(), parsed);
      migrateLegacyCollections();
      saveStateLocalOnly();
      pushFullStateNow();
      render();
      alert('Backup restored successfully.');
    } catch (err) {
      alert('Could not restore backup: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function setupServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const swCode = `
      const CACHE_NAME = 'sbs-filling-station-v2';
      const ASSETS_TO_CACHE = [
        './',
        'https://cdn.tailwindcss.com',
        'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js'
      ];

      self.addEventListener('install', function(e) {
        self.skipWaiting();
        e.waitUntil(
          caches.open(CACHE_NAME).then(function(cache) {
            return cache.addAll(ASSETS_TO_CACHE).catch(function() {});
          })
        );
      });

      self.addEventListener('activate', function(e) {
        e.waitUntil(
          caches.keys().then(function(keys) {
            return Promise.all(
              keys.map(function(key) {
                if (key !== CACHE_NAME) return caches.delete(key);
              })
            );
          }).then(function() {
            return self.clients.claim();
          })
        );
      });

      self.addEventListener('fetch', function(e) {
        if (e.request.method !== 'GET') return;
        
        // Instant Cache Return Strategy
        e.respondWith(
          caches.match(e.request).then(function(cachedResponse) {
            if (cachedResponse) {
              // Background update cache
              fetch(e.request).then(function(networkResponse) {
                if (networkResponse && networkResponse.status === 200) {
                  caches.open(CACHE_NAME).then(function(cache) {
                    cache.put(e.request, networkResponse);
                  });
                }
              }).catch(function() {});
              return cachedResponse;
            }

            return fetch(e.request).catch(function() {
              return new Response('Offline', { status: 503, statusText: 'Offline' });
            });
          })
        );
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(function() {});
  } catch (e) {}
}

let isCrashHandled = false;

// 1. Preloader ko forcibly hide karne ka fail-safe
function forceHidePreloader() {
  try {
    const loaders = document.querySelectorAll('#preloader, .loader, .spinner, [id*="loading"], [class*="loader"]');
    loaders.forEach(el => {
      el.style.display = 'none';
      el.style.opacity = '0';
      el.style.visibility = 'hidden';
    });
  } catch (e) {}
}

// 2. Fallback Recovery Screen (Blank Screen ko rokne ke liye)
function showCrashScreen(err) {
  forceHidePreloader();
  
  // Guard against infinite error loops
  if (isCrashHandled) return;
  isCrashHandled = true;

  console.error('CRASH INTERCEPTED BY SAFETY NET:', err);

  const errorMsg = (err && (err.message || err.toString())) || 'Unknown System Issue';

  // Agar custom showCrashScreen function pehle se define nahi hai, toh yeh auto-render hoga
  const crashHTML = `
    <div style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#0A2540; color:#ffffff; display:flex; flex-direction:column; align-items:center; justify-center:center; z-index:999999; padding:20px; text-align:center; font-family:sans-serif;">

        <button onclick="window.location.reload()" style="width:100%; background:#F5A623; color:#0A2540; font-weight:bold; padding:12px; border:none; border-radius:10px; font-size:14px; cursor:pointer; margin-bottom:10px; transition:all 0.2s;">

        <button onclick="document.body.innerHTML=''; window.location.href=window.location.pathname;" style="width:100%; background:transparent; color:#CBD5E1; font-weight:600; padding:10px; border:1px solid rgba(255,255,255,0.2); border-radius:10px; font-size:12px; cursor:pointer;">
          🏠 Dashboard Par Jayein
        </button>
        
        <details style="margin-top:15px; text-align:left; font-size:10px; color:#64748B; cursor:pointer;">

        </details>
      </div>
    </div>
  `;

  try {
    document.body.innerHTML = crashHTML;
  } catch (e) {

window.addEventListener('error', function(event) {
  // Ignore harmless third-party resource 404s (like missing favicons or image load errors)
  if (event.target && (event.target.tagName === 'IMG' || event.target.tagName === 'LINK' || event.target.tagName === 'SCRIPT')) {
    return;
  }
  console.error('Uncaught Error:', event.error || event.message);
  showCrashScreen(event.error || { message: event.message });
}, true);

// 4. Asynchronous Promise / Firebase Rejections Catching
window.addEventListener('unhandledrejection', function(event) {
  console.error('Unhandled Rejection:', event.reason);
  
  // Agar network disconnect ya fetch fail ho, toh crash screen mat dikhao, chupchap handle karo
  const reasonStr = String(event.reason || '');
  if (reasonStr.includes('Failed to fetch') || reasonStr.includes('NetworkError') || reasonStr.includes('offline')) {
    event.preventDefault();
    forceHidePreloader();
    return;
  }
  
  showCrashScreen(event.reason || { message: 'Async Operation Rejection' });
});
  
/* =========================================================
   INIT (INSTANT FAST APP LOAD - ZERO DELAY)
========================================================= */
// 1. Instant Preloader Hide Strategy
(function instantStart() {
  // Preloader ko immediate hide karo local render se pehle
  const hideLoader = () => {
    const loader = document.getElementById('preloader') || document.querySelector('.loader') || document.querySelector('.spinner');
    if (loader) loader.style.display = 'none';
  };

  // Local Storage se Synchronous Load (0 Milliseconds)
  try {
    const cached = localStorage.getItem(STORAGE_KEY);
    if (cached) {
      state = Object.assign(defaultState(), JSON.parse(cached));
    }
  } catch(e) {
    console.error('Local cache read error:', e);
  }

  // Fast Service Worker & Manifest Init
  try { setupManifest(); } catch (e) {}
  try { setupServiceWorker(); } catch (e) {}

  // Immediate Local Screen Render
  try {
    render();
    hideLoader();
  } catch (e) {
    console.error('Initial render failed:', e);
    hideLoader();
  }

  // Firebase Cloud Listener Ko Async Delay Se Connect Karo (Taaki Load Screen Block Na Ho)
  setTimeout(() => {
    try {
      if (typeof attachCloudListener === 'function') {
        attachCloudListener();
      }
    } catch (e) {
      console.error('Background listener error:', e);
    }
  }, 300);
})();
</script>
